<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="board-section">
        <h1>TETRIS</h1>
        <div class="board-wrapper">
          <canvas id="game-board" width="300" height="600" aria-label="Tetris Board"></canvas>
          <div id="overlay" class="overlay hidden" aria-live="polite">
            <p id="overlay-title">PAUSED</p>
            <p id="overlay-subtitle">P キーで再開</p>
          </div>
        </div>
      </section>

      <aside class="side-panel">
        <section class="panel stat-panel">
          <h2>Status</h2>
          <div class="stat-row"><span>Score</span><strong id="score">0</strong></div>
          <div class="stat-row"><span>Level</span><strong id="level">1</strong></div>
          <div class="stat-row"><span>Lines</span><strong id="lines">0</strong></div>
          <div class="stat-row"><span>Combo</span><strong id="combo">0</strong></div>
          <div class="stat-row"><span>B2B</span><strong id="b2b">0</strong></div>
          <div class="stat-row"><span>Last Move</span><strong id="last-move">-</strong></div>
        </section>

        <section class="panel preview-panel">
          <h2>Next</h2>
          <canvas id="next-canvas" width="120" height="120" aria-label="Next Piece"></canvas>
        </section>

        <section class="panel preview-panel">
          <h2>Hold</h2>
          <canvas id="hold-canvas" width="120" height="120" aria-label="Hold Piece"></canvas>
          <p class="hint">C キーでホールド</p>
        </section>

        <section class="panel controls-panel">
          <h2>Controls</h2>
          <ul>
            <li>← / → : 左右移動</li>
            <li>↓ : ソフトドロップ</li>
            <li>↑ : 回転</li>
            <li>Space : ハードドロップ</li>
            <li>C : ホールド</li>
            <li>P : ポーズ</li>
            <li>R : リスタート</li>
          </ul>
        </section>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
