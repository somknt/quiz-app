<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris Neon</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <aside class="left-rail neon-frame">
        <div class="rail-title">HOLD</div>
        <canvas id="hold-canvas" width="120" height="120" aria-label="Hold Piece"></canvas>
        <div class="energy-wrap">
          <div class="energy-label">ENERGY</div>
          <div class="energy-bar"></div>
        </div>
      </aside>

      <section class="center-stage">
        <header class="top-hud">
          <div class="ko-chip">K.O.s</div>
          <div class="ko-ring">R</div>
        </header>

        <div class="target-row neon-frame">
          <button type="button" class="target-btn is-active">Randoms</button>
          <button type="button" class="target-btn">Attackers</button>
          <button type="button" class="target-btn">Badges</button>
          <button type="button" class="target-btn">Targeting</button>
        </div>

        <div class="board-wrapper neon-frame">
          <canvas id="game-board" width="360" height="720" aria-label="Tetris Board"></canvas>
          <div id="overlay" class="overlay hidden" aria-live="polite">
            <p id="overlay-title">PAUSED</p>
            <p id="overlay-subtitle">P キーで再開</p>
          </div>
        </div>
      </section>

      <aside class="right-rail neon-frame">
        <div class="panel-title">NEXT</div>
        <canvas id="next-canvas" width="120" height="120" aria-label="Next Piece"></canvas>

        <section class="score-panel">
          <div class="score-row score-primary"><span>SCORE</span><strong id="score">0</strong></div>
          <div class="score-row"><span>LEVEL</span><strong id="level">1</strong></div>
          <div class="score-row"><span>K.O.</span><strong id="b2b">0</strong></div>
          <div class="score-row"><span>LINES</span><strong id="lines">0</strong></div>
          <div class="score-row"><span>COMBO</span><strong id="combo">0</strong></div>
          <div class="score-row last"><span>SKILL</span><strong id="last-move">-</strong></div>
        </section>

        <section class="controls-panel">
          <p>← → 移動</p>
          <p>↑ 回転 / ↓ ソフト</p>
          <p>Space ハード / C Hold</p>
          <p>P ポーズ / R リスタート</p>
        </section>

        <section id="touch-controls" class="touch-controls" aria-label="Touch Controls">
          <button type="button" class="touch-btn" data-action="left">←</button>
          <button type="button" class="touch-btn" data-action="right">→</button>
          <button type="button" class="touch-btn" data-action="rotate">⟳</button>
          <button type="button" class="touch-btn touch-btn-soft" data-action="down">↓</button>
          <button type="button" class="touch-btn touch-btn-wide" data-action="drop">DROP</button>
          <button type="button" class="touch-btn touch-btn-wide" data-action="hold">HOLD</button>
          <button type="button" class="touch-btn touch-btn-wide" data-action="pause">PAUSE</button>
          <button type="button" class="touch-btn touch-btn-wide touch-btn-restart" data-action="restart">RESTART</button>
        </section>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
